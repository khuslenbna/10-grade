<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen flex justify-center items-center bg-white">
<div class="w-[20%] border-2 border-black p-5 bg-black rounded-lg">
    <input type="text" id="display" disabled class="w-full p-2 text-4xl text-right mb-2 border border-black rounded bg-black text-white">
    <div class="grid grid-cols-4 gap-2">
        <button onclick="clearDisplay()" class="p-5 text-xl bg-orange-700 rounded">C</button>
        <button onclick="appendToDisplay('7')" class="p-5 text-xl bg-gray-200 rounded ">7</button>
        <button onclick="appendToDisplay('8')" class="p-5 text-xl bg-gray-200 rounded ">8</button>
        <button onclick="appendToDisplay('9')" class="p-5 text-xl bg-gray-200 rounded ">9</button>
        <button onclick="appendToDisplay('/')" class="p-5 text-xl bg-orange-700 rounded ">/</button>
        <button onclick="appendToDisplay('4')" class="p-5 text-xl bg-gray-200 rounded ">4</button>
        <button onclick="appendToDisplay('5')" class="p-5 text-xl bg-gray-200 rounded ">5</button>
        <button onclick="appendToDisplay('6')" class="p-5 text-xl bg-gray-200 rounded ">6</button>
        <button onclick="appendToDisplay('*')" class="p-5 text-xl bg-orange-700 rounded ">x</button> 
        <button onclick="appendToDisplay('1')" class="p-5 text-xl bg-gray-200 rounded ">1</button>
        <button onclick="appendToDisplay('2')" class="p-5 text-xl bg-gray-200 rounded ">2</button>
        <button onclick="appendToDisplay('3')" class="p-5 text-xl bg-gray-200 rounded ">3</button>
        <button onclick="appendToDisplay('-')" class="p-5 text-xl bg-orange-700 rounded ">-</button>
        <button onclick="appendToDisplay('0')" class="p-5 text-xl bg-gray-200 rounded ">0</button>
        <button onclick="appendToDisplay('.')" class="p-5 text-xl bg-gray-200 rounded ">.</button>
        <button onclick="calculateResult()" class="p-5 text-xl bg-orange-700 rounded ">=</button>
        <button onclick="appendToDisplay('+')" class="p-5 text-xl bg-orange-700 rounded ">+</button>
        </div>
    </div>
        <script>
    function clearDisplay() {
        document.getElementById('display').value = '';
    }
    function appendToDisplay(value) {
        document.getElementById('display').value += value;
    }
    function calculateResult() {
        let display = document.getElementById('display');
        try {
            display.value = eval(display.value);
        } catch (e) {
            display.value = 'Error';
        }
    }
</script>
</body>
</html>
